<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSFX Confluence Backtester</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
          --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
          --yellow: #d29922; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,
         'Segoe UI', Helvetica, Arial, sans-serif; padding: 24px; max-width: 1200px;
         margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 13px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 14px; color: var(--dim); text-transform: uppercase;
             letter-spacing: 0.5px; margin-bottom: 12px; }
  label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 4px; }
  input[type="number"], input[type="text"], select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px;
    width: 100%; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .row { display: flex; gap: 16px; margin-bottom: 12px; }
  .row > div { flex: 1; }
  button { background: #238636; color: #fff; border: none; padding: 10px 24px;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
    width: 100%; margin-top: 8px; }
  button:hover { background: #2ea043; }
  button:disabled { background: var(--border); cursor: not-allowed; }
  .btn-sm { width: auto; padding: 4px 10px; font-size: 12px; border-radius: 4px;
            font-weight: 500; cursor: pointer; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .status { margin-top: 12px; font-size: 13px; color: var(--dim); display: none; }
  .status.active { display: block; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .saved-hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .saved-hint .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); margin-right: 4px; vertical-align: middle; }

  /* Progress bar */
  .progress-wrap { display: none; margin-top: 12px; }
  .progress-wrap.active { display: block; }
  .progress-bar-bg { width: 100%; height: 8px; background: var(--bg); border-radius: 4px;
    overflow: hidden; border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.3s ease; width: 0%; }
  .progress-text { font-size: 12px; color: var(--dim); margin-top: 4px; }

  /* Strategy Selector */
  .strat-selector { position: relative; }
  .strat-search { width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px 8px 32px; border-radius: 6px; font-size: 14px;
    outline: none; }
  .strat-search:focus { border-color: var(--accent); }
  .strat-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--dim); font-size: 14px; pointer-events: none; }
  .strat-selected { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; min-height: 28px; }
  .strat-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
    background: rgba(88,166,255,0.15); color: var(--accent); border-radius: 4px;
    font-size: 12px; font-weight: 500; }
  .strat-tag .x { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
  .strat-tag .x:hover { opacity: 1; }
  .strat-list { max-height: 220px; overflow-y: auto; border: 1px solid var(--border);
    border-radius: 6px; margin-top: 4px; }
  .strat-list::-webkit-scrollbar { width: 6px; }
  .strat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .strat-item { display: flex; align-items: center; padding: 6px 12px; cursor: pointer;
    font-size: 13px; gap: 8px; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .strat-item:hover { background: rgba(88,166,255,0.05); }
  .strat-item.selected { background: rgba(88,166,255,0.1); }
  .strat-item .cb { width: 14px; height: 14px; border: 1px solid var(--border);
    border-radius: 3px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 10px; }
  .strat-item.selected .cb { background: var(--accent); border-color: var(--accent); color: #fff; }
  .strat-item .name { flex: 1; }
  .strat-item .tfs { color: var(--dim); font-size: 11px; }
  .strat-count { font-size: 12px; color: var(--dim); margin-top: 4px; }

  /* File info bar */
  .file-info { display: flex; align-items: center; gap: 12px; padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    margin-top: 8px; font-size: 12px; color: var(--dim); }
  .file-info .icon { font-size: 16px; }
  .file-info .detail { color: var(--text); }

  /* S/R Toggle */
  .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; height: 38px; margin-top: 0; }
  .toggle-row input[type="checkbox"] {
    width: 36px; height: 20px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 10px; position: relative;
    cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .toggle-row input[type="checkbox"]::after {
    content: ''; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px;
    background: var(--dim); border-radius: 50%; transition: all 0.2s; }
  .toggle-row input[type="checkbox"]:checked { background: var(--accent); }
  .toggle-row input[type="checkbox"]:checked::after {
    left: 18px; background: #fff; }
  .toggle-label { font-size: 13px; color: var(--dim); font-weight: 500; }

  /* Bucket Manager */
  .bucket-row { display: flex; gap: 16px; }
  .bucket-load { flex: 1; }
  .bucket-save { flex: 1.5; }
  .bucket-status { font-size: 12px; margin-top: 4px; min-height: 18px; }
  .bucket-status .ok { color: var(--green); }
  .bucket-status .err { color: var(--red); }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat { text-align: center; }
  .stat .val { font-size: 28px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .stat .val.pos { color: var(--green); }
  .stat .val.neg { color: var(--red); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--dim); font-weight: 500; padding: 8px 12px;
       border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: rgba(88,166,255,0.05); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
         font-weight: 600; }
  .tag-long { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-short { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag-tp { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-sl { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag-eod { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .trades-wrap { max-height: 500px; overflow-y: auto; }
  .trades-wrap::-webkit-scrollbar { width: 6px; }
  .trades-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<h1>⚡ RSFX Confluence Backtester</h1>
<p class="subtitle">Signal-buffer confluence — multiple strategies, majority vote entry</p>

<div class="card">
  <h2>Configuration</h2>

  <!-- Data Source -->
  <div class="row">
    <div>
      <label>Data File</label>
      <select id="csvFile" onchange="onFileChange()"></select>
    </div>
    <div>
      <label>Symbol</label>
      <input type="text" id="symbol" value="USDJPY" placeholder="USDJPY">
    </div>
  </div>
  <div class="file-info" id="fileInfo">
    <span class="icon">📁</span>
    <span id="fileDetail">Loading files...</span>
  </div>

  <!-- Strategies -->
  <div style="margin-top: 16px;">
    <label>Strategies</label>
    <div class="strat-selector">
      <span class="strat-search-icon">🔍</span>
      <input type="text" class="strat-search" id="stratSearch" placeholder="Search strategies..." autocomplete="off">
      <div class="strat-selected" id="stratTags"></div>
      <div class="strat-list" id="stratList"></div>
      <div class="strat-count" id="stratCount"></div>
    </div>
    <div style="margin-top: 8px; display: flex; gap: 6px;">
      <button class="btn-sm" onclick="selectAll()">All</button>
      <button class="btn-sm" onclick="selectPreset('top3')">Top 3</button>
      <button class="btn-sm" onclick="selectPreset('h1')">H1 Trend</button>
      <button class="btn-sm" onclick="selectPreset('divergence')">Divergence</button>
      <button class="btn-sm" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Parameters -->
  <div class="row" style="margin-top: 16px;">
    <div>
      <label>Lookback (candle window)</label>
      <input type="number" id="lookback" value="5" min="1" max="50">
    </div>
    <div>
      <label>Threshold (min agreements)</label>
      <input type="number" id="threshold" value="2" min="1" max="10">
    </div>
    <div>
      <label>&nbsp;</label>
      <label class="toggle-row">
        <input type="checkbox" id="useSr">
        <span class="toggle-label">S/R Levels</span>
      </label>
    </div>
  </div>
  <div class="row" style="margin-top: 8px;">
    <div>
      <label>Spread (pips, round-trip)</label>
      <input type="number" id="spreadPips" value="0.5" min="0" max="5" step="0.1">
    </div>
    <div>
      <label>Min R:R (reward/risk)</label>
      <input type="number" id="minRr" value="1.0" min="0" max="10" step="0.1">
    </div>
    <div></div>
  </div>

  <!-- Bucket Manager -->
  <div class="bucket-row" style="margin-top: 12px;">
    <div class="bucket-load">
      <label>Load Bucket</label>
      <select id="bucketSelect" onchange="loadBucket()">
        <option value="">— Select saved bucket —</option>
      </select>
    </div>
    <div class="bucket-save">
      <label>Save Current as Bucket</label>
      <div style="display:flex;gap:6px">
        <input type="text" id="bucketName" placeholder="My Strategy Bucket" style="flex:1">
        <button class="btn-sm" onclick="saveBucket()" style="white-space:nowrap">💾 Save</button>
      </div>
    </div>
  </div>
  <div class="bucket-status" id="bucketStatus"></div>

  <button id="runBtn" onclick="runBacktest()">▶ Run Backtest</button>
  <div class="saved-hint" id="savedHint"></div>
  <div id="status" class="status"></div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
</div>

<div id="results" class="results">
  <div class="card">
    <h2>Summary</h2>
    <div class="stat-grid" id="stats"></div>
  </div>

  <div class="card">
    <h2>Trades</h2>
    <div class="trades-wrap">
      <table id="tradesTable">
        <thead>
          <tr>
            <th>#</th><th>Entry Time</th><th>Dir</th><th>Entry</th><th>TP</th>
            <th>SL</th><th>Exit</th><th>PnL</th><th>MAE</th><th>MFE</th>
            <th>Bars</th><th>Exit</th><th>Strategies</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>Strategy Participation</h2>
    <div id="participation"></div>
  </div>
</div>

<script>
const API = '';
const STORAGE_KEY = 'rsfx_confluence_state';
let allStrategies = [];
let allFiles = [];
let selected = new Set();

// ── LocalStorage ─────────────────────────────────────────────────
function saveState() {
  const state = {
    strategies: [...selected],
    lookback: document.getElementById('lookback').value,
    threshold: document.getElementById('threshold').value,
    csvFile: document.getElementById('csvFile').value,
    symbol: document.getElementById('symbol').value,
    useSr: document.getElementById('useSr').checked,
    spreadPips: document.getElementById('spreadPips').value,
    minRr: document.getElementById('minRr').value,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showSaved();
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function showSaved() {
  const el = document.getElementById('savedHint');
  el.innerHTML = '<span class="dot"></span>Settings saved to browser';
  setTimeout(() => { el.innerHTML = ''; }, 2000);
}

// ── Load from server ─────────────────────────────────────────────
Promise.all([
  fetch(`${API}/strategies`).then(r => r.json()),
  fetch(`${API}/files`).then(r => r.json()),
]).then(([stratData, fileData]) => {
  allStrategies = stratData.strategies;
  allFiles = fileData.files;

  // Restore saved state or defaults
  const saved = loadState();
  if (saved) {
    // Populate file dropdown first so saved.csvFile can be set
    renderFileList();
    if (saved.csvFile) document.getElementById('csvFile').value = saved.csvFile;
    if (saved.symbol) document.getElementById('symbol').value = saved.symbol;
    if (saved.lookback) document.getElementById('lookback').value = saved.lookback;
    if (saved.threshold) document.getElementById('threshold').value = saved.threshold;
    if (saved.useSr !== undefined) document.getElementById('useSr').checked = saved.useSr;
    if (saved.spreadPips) document.getElementById('spreadPips').value = saved.spreadPips;
    if (saved.minRr) document.getElementById('minRr').value = saved.minRr;
    if (saved.strategies && saved.strategies.length) {
      selected = new Set(saved.strategies);
    } else {
      selectPreset('top3');
    }
    onFileChange();  // update file detail + save restored state
    renderList();
  } else {
    renderFileList();
    renderList();
    selectPreset('top3');
  }

  // Load bucket list
  loadBucketList();
});

// ── File selector ────────────────────────────────────────────────
function renderFileList() {
  const sel = document.getElementById('csvFile');
  sel.innerHTML = allFiles.map(f =>
    `<option value="${f.name}">${f.name} (${f.size_mb} MB)</option>`
  ).join('');
  onFileChange();
}

function onFileChange() {
  const name = document.getElementById('csvFile').value;
  const file = allFiles.find(f => f.name === name);
  const detail = document.getElementById('fileDetail');
  if (file) {
    detail.innerHTML = `<span class="detail">${file.name}</span> — ${file.size_mb} MB — ${file.path}`;
  }
  saveState();
}

// ── Search / filter ──────────────────────────────────────────────
document.getElementById('stratSearch').addEventListener('input', renderList);

// Save on any input change
['lookback', 'threshold', 'symbol', 'spreadPips', 'minRr'].forEach(id => {
  document.getElementById(id).addEventListener('change', saveState);
});
document.getElementById('useSr').addEventListener('change', saveState);

function renderList() {
  const q = document.getElementById('stratSearch').value.toLowerCase();
  const list = document.getElementById('stratList');
  const filtered = allStrategies.filter(s =>
    s.name.toLowerCase().includes(q) || s.timeframes.some(t => t.toLowerCase().includes(q))
  );

  list.innerHTML = filtered.map(s => {
    const sel = selected.has(s.name) ? 'selected' : '';
    return `<div class="strat-item ${sel}" onclick="toggle('${s.name}')">
      <div class="cb">${selected.has(s.name) ? '✓' : ''}</div>
      <div class="name">${highlight(s.name, q)}</div>
      <div class="tfs">${s.timeframes.join(', ')}</div>
    </div>`;
  }).join('');

  renderTags();
  document.getElementById('stratCount').textContent =
    `${selected.size} selected / ${allStrategies.length} total`;
}

function highlight(name, q) {
  if (!q) return name;
  const i = name.toLowerCase().indexOf(q);
  if (i < 0) return name;
  return name.slice(0, i) + '<b style="color:var(--accent)">' + name.slice(i, i + q.length) + '</b>' + name.slice(i + q.length);
}

// ── Toggle select ────────────────────────────────────────────────
function toggle(name) {
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  renderList();
  saveState();
}

function selectAll() {
  allStrategies.forEach(s => selected.add(s.name));
  renderList();
  saveState();
}

function clearAll() {
  selected.clear();
  renderList();
  saveState();
}

function selectPreset(preset) {
  selected.clear();
  const presets = {
    'top3': ['tweezer_reversal', 'h1_trend_m5_rsi', 'cci_ema'],
    'h1': allStrategies.filter(s => s.name.startsWith('h1_')).map(s => s.name),
    'divergence': allStrategies.filter(s => s.name.includes('divergence')).map(s => s.name),
  };
  (presets[preset] || []).forEach(n => selected.add(n));
  renderList();
  saveState();
}

// ── Tags ─────────────────────────────────────────────────────────
function renderTags() {
  const el = document.getElementById('stratTags');
  el.innerHTML = [...selected].sort().map(n =>
    `<span class="strat-tag">${n} <span class="x" onclick="event.stopPropagation(); toggle('${n}')">×</span></span>`
  ).join('');
}

// ── Run backtest ─────────────────────────────────────────────────
async function runBacktest() {
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  const strats = [...selected];

  if (strats.length < 1) {
    status.className = 'status active';
    status.textContent = '⚠ Select at least 1 strategy';
    return;
  }

  const lookback = parseInt(document.getElementById('lookback').value);
  const threshold = parseInt(document.getElementById('threshold').value);
  const csvFile = document.getElementById('csvFile').value;
  const symbol = document.getElementById('symbol').value.trim() || 'USDJPY';
  const useSr = document.getElementById('useSr').checked;
  const spreadPips = parseFloat(document.getElementById('spreadPips').value) || 0.5;
  const minRr = parseFloat(document.getElementById('minRr').value) || 1.0;

  if (threshold > strats.length) {
    status.className = 'status active';
    status.textContent = `⚠ Threshold (${threshold}) can't exceed strategy count (${strats.length})`;
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  status.className = 'status active';
  status.innerHTML = `<span class="spinner"></span>Running ${strats.length} strategies on ${csvFile} (lb=${lookback}, t=${threshold}, spread=${spreadPips}p, minRR=${minRr}${useSr ? ', +S/R' : ''})...`;

  // Show progress bar
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  progressWrap.classList.add('active');
  progressFill.style.width = '0%';
  progressText.textContent = 'Starting...';

  // Poll progress every 1s
  let progressTimer = setInterval(async () => {
    try {
      const p = await fetch(`${API}/progress`).then(r => r.json());
      if (p.running) {
        progressFill.style.width = `${p.pct}%`;
        progressText.textContent =
          `${p.pct}% — candle ${p.candle?.toLocaleString()}/${p.total?.toLocaleString()} | ` +
          `trades=${p.trades} | confluences=${p.confluences} | ${p.elapsed}s`;
      } else {
        progressFill.style.width = '100%';
        progressText.textContent = 'Finalizing...';
      }
    } catch {}
  }, 1000);

  try {
    const resp = await fetch(`${API}/run`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ strategies: strats, lookback, threshold, csv_file: csvFile, symbol, use_sr: useSr, spread_pips: spreadPips, min_rr: minRr })
    });
    const data = await resp.json();
    if (data.error) {
      status.textContent = `❌ ${data.error}`;
      return;
    }
    const r = data.result;
    const balStr = r.initial_balance ? ` | $${r.initial_balance}→$${r.final_balance}` : '';
    const ddStr = r.max_drawdown_pct ? ` | DD ${r.max_drawdown_pct}%` : '';
    const bankStr = r.bankrupt ? ' ⚠ BANKRUPT' : '';
    status.innerHTML = `✅ Done in ${data.elapsed}s — ${r.total_trades} trades, ${r.n_candles?.toLocaleString()} candles, ${r.total_pnl_pips > 0 ? '+' : ''}${r.total_pnl_pips} pips${balStr}${ddStr}${bankStr}`;
    renderResults(data);
  } catch (e) {
    status.textContent = `❌ ${e.message}`;
  } finally {
    clearInterval(progressTimer);
    progressWrap.classList.remove('active');
    btn.disabled = false;
    btn.textContent = '▶ Run Backtest';
  }
}

// ── Render results ───────────────────────────────────────────────
function renderResults(data) {
  document.getElementById('results').classList.add('visible');
  const r = data.result;
  const pnlClass = r.total_pnl_pips >= 0 ? 'pos' : 'neg';

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="val">${r.total_trades}</div><div class="lbl">Trades</div></div>
    <div class="stat"><div class="val ${pnlClass}">${r.total_pnl_pips > 0 ? '+' : ''}${r.total_pnl_pips.toFixed(1)}</div><div class="lbl">PnL (pips)</div></div>
    <div class="stat"><div class="val">${r.win_rate.toFixed(1)}%</div><div class="lbl">Win Rate</div></div>
    <div class="stat"><div class="val">${r.profit_factor.toFixed(2)}</div><div class="lbl">Profit Factor</div></div>
    <div class="stat"><div class="val" style="color:var(--green)">${r.avg_win_pips > 0 ? '+' : ''}${r.avg_win_pips.toFixed(2)}</div><div class="lbl">Avg Win</div></div>
    <div class="stat"><div class="val" style="color:var(--red)">${r.avg_loss_pips.toFixed(2)}</div><div class="lbl">Avg Loss</div></div>
    <div class="stat"><div class="val" style="color:var(--green)">${r.median_win_pips > 0 ? '+' : ''}${r.median_win_pips.toFixed(2)}</div><div class="lbl">Median Win</div></div>
    <div class="stat"><div class="val" style="color:var(--red)">${r.median_loss_pips.toFixed(2)}</div><div class="lbl">Median Loss</div></div>
    <div class="stat"><div class="val">${r.avg_bars_held}</div><div class="lbl">Avg Bars Held</div></div>
    <div class="stat"><div class="val">${r.spread_pips}</div><div class="lbl">Spread (pips)</div></div>
    <div class="stat"><div class="val">${r.min_rr}:1</div><div class="lbl">Min R:R</div></div>
    <div class="stat"><div class="val">${r.expectancy_pips.toFixed(1)}</div><div class="lbl">Expectancy</div></div>
    ${r.initial_balance ? `
    <div class="stat"><div class="val">$${r.initial_balance.toLocaleString()}</div><div class="lbl">Start Balance</div></div>
    <div class="stat"><div class="val" style="color:${r.final_balance >= r.initial_balance ? 'var(--green)' : 'var(--red)'}">$${r.final_balance.toLocaleString()}</div><div class="lbl">Final Balance</div></div>
    <div class="stat"><div class="val" style="color:${r.total_pnl_dollars >= 0 ? 'var(--green)' : 'var(--red)'}">${r.total_pnl_dollars >= 0 ? '+' : ''}$${r.total_pnl_dollars.toLocaleString()}</div><div class="lbl">PnL ($)</div></div>
    <div class="stat"><div class="val">${r.max_drawdown_pct}%</div><div class="lbl">Max Drawdown</div></div>
    <div class="stat"><div class="val">${r.bankrupt ? '⚠ YES' : '✅ No'}</div><div class="lbl">Bankrupt</div></div>
    ` : ''}
  `;

  const tbody = document.querySelector('#tradesTable tbody');
  tbody.innerHTML = data.trades.map((t, i) => {
    const dirClass = t.direction === 'LONG' ? 'tag-long' : 'tag-short';
    const exitClass = t.exit_reason === 'TP' ? 'tag-tp' : t.exit_reason === 'SL' ? 'tag-sl' : 'tag-eod';
    const pnlColor = t.pnl_pips >= 0 ? 'var(--green)' : 'var(--red)';
    return `<tr>
      <td>${i+1}</td>
      <td style="font-size:12px;white-space:nowrap">${t.entry_time}</td>
      <td><span class="tag ${dirClass}">${t.direction}</span></td>
      <td>${t.entry_price.toFixed(5)}</td>
      <td>${t.take_profit.toFixed(5)}</td>
      <td>${t.stop_loss.toFixed(5)}</td>
      <td>${t.exit_price ? t.exit_price.toFixed(5) : '-'}</td>
      <td style="color:${pnlColor}">${t.pnl_pips > 0 ? '+' : ''}${t.pnl_pips.toFixed(1)}</td>
      <td style="color:var(--red)">${t.mae_pips.toFixed(1)}</td>
      <td style="color:var(--green)">${t.mfe_pips.toFixed(1)}</td>
      <td>${t.bars_held}</td>
      <td><span class="tag ${exitClass}">${t.exit_reason}</span></td>
      <td style="font-size:11px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.strategies}</td>
    </tr>`;
  }).join('');

  // Participation
  const counts = {};
  data.trades.forEach(t => {
    t.strategies.split(' + ').forEach(s => { counts[s] = (counts[s] || 0) + 1; });
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  document.getElementById('participation').innerHTML = sorted.map(([name, count]) => {
    const pct = (count / data.trades.length * 100).toFixed(1);
    return `<div style="display:flex;align-items:center;margin:4px 0">
      <div style="width:200px;font-size:13px;text-align:right;padding-right:12px;color:var(--dim)">${name}</div>
      <div style="flex:1;background:var(--bg);border-radius:4px;height:20px;position:relative">
        <div style="width:${(count/max*100).toFixed(0)}%;background:var(--accent);border-radius:4px;height:100%;opacity:0.6"></div>
      </div>
      <div style="width:80px;font-size:12px;padding-left:8px">${count} (${pct}%)</div>
    </div>`;
  }).join('');
}
// ── Bucket management ─────────────────────────────────────────────
let allBuckets = [];

async function loadBucketList() {
  try {
    const resp = await fetch(`${API}/buckets`);
    const data = await resp.json();
    allBuckets = data.buckets || [];
    const sel = document.getElementById('bucketSelect');
    sel.innerHTML = '<option value="">— Select saved bucket —</option>' +
      allBuckets.map(b => {
        const sr = b.use_sr ? ' +S/R' : '';
        const wr = b.backtest_result?.win_rate ? ` (${b.backtest_result.win_rate}% WR)` : '';
        const pnl = b.backtest_result?.total_pnl_pips ? `, ${b.backtest_result.total_pnl_pips > 0 ? '+' : ''}${b.backtest_result.total_pnl_pips}p` : '';
        return `<option value="${b.name}">${b.name}${sr} — ${b.strategy_count} strategies${wr}${pnl}</option>`;
      }).join('');
  } catch (e) {
    console.error('Failed to load buckets:', e);
  }
}

async function loadBucket() {
  const name = document.getElementById('bucketSelect').value;
  if (!name) return;

  try {
    const resp = await fetch(`${API}/load-bucket/${encodeURIComponent(name)}`);
    const data = await resp.json();
    if (data.error) {
      showBucketStatus(data.error, true);
      return;
    }
    const b = data.bucket;
    selected = new Set(b.strategies);
    document.getElementById('lookback').value = b.lookback;
    document.getElementById('threshold').value = b.threshold;
    document.getElementById('csvFile').value = b.csv_file;
    document.getElementById('symbol').value = b.symbol;
    document.getElementById('useSr').checked = b.use_sr;
    renderList();
    onFileChange();
    saveState();
    showBucketStatus(`✓ Loaded "${name}"`, false);
  } catch (e) {
    showBucketStatus(`Failed: ${e.message}`, true);
  }
}

async function saveBucket() {
  const name = document.getElementById('bucketName').value.trim();
  if (!name) {
    showBucketStatus('Enter a bucket name', true);
    return;
  }
  const strats = [...selected];
  if (strats.length < 1) {
    showBucketStatus('Select at least 1 strategy', true);
    return;
  }

  const payload = {
    name,
    strategies: strats,
    lookback: parseInt(document.getElementById('lookback').value),
    threshold: parseInt(document.getElementById('threshold').value),
    csv_file: document.getElementById('csvFile').value,
    symbol: document.getElementById('symbol').value.trim() || 'USDJPY',
    use_sr: document.getElementById('useSr').checked,
    backtest_result: window._lastResult || null,
  };

  try {
    const resp = await fetch(`${API}/save-bucket`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (data.ok) {
      showBucketStatus(`✓ Saved "${name}" to ${data.path}`, false);
      document.getElementById('bucketName').value = '';
      loadBucketList();
    } else {
      showBucketStatus(`Error: ${data.error}`, true);
    }
  } catch (e) {
    showBucketStatus(`Failed: ${e.message}`, true);
  }
}

function showBucketStatus(msg, isError) {
  const el = document.getElementById('bucketStatus');
  el.className = 'bucket-status ' + (isError ? 'err' : 'ok');
  el.textContent = msg;
  if (!isError) setTimeout(() => { el.textContent = ''; el.className = 'bucket-status'; }, 3000);
}

// Store last result for bucket saving
const origRenderResults = window.renderResults;
window.renderResults = function(data) {
  window._lastResult = data.result;
  origRenderResults(data);
};
</script>
